<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompanyLens — AI Business Enrichment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg:       #090d13;
  --surface:  #111620;
  --surface2: #161c28;
  --border:   #1e2840;
  --accent:   #38f5a0;
  --accent2:  #6c63ff;
  --text:     #dde4f0;
  --muted:    #5a6480;
  --danger:   #ff5f6d;
  --warn:     #ffc94d;
  --r:        10px;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 36px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.logo-name { font-size: 20px; font-weight: 800; letter-spacing: -.4px; }
.logo-name em { color: var(--accent); font-style: normal; }
.hdr-pill {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: var(--border);
  padding: 4px 12px;
  border-radius: 20px;
}
.health-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
  margin-right: 6px;
  transition: background .3s;
}
.health-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.health-dot.err { background: var(--danger); }

/* ── LAYOUT ── */
.wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px; }

/* ── SECTION HEADER ── */
.sec-head {
  display: flex; align-items: center; gap: 12px;
  margin: 52px 0 22px;
}
.sec-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(56,245,160,.1);
  border: 1px solid rgba(56,245,160,.22);
  padding: 3px 9px;
  border-radius: 5px;
}
.sec-head h2 { font-size: 22px; font-weight: 700; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px;
}

/* ── FORM ── */
.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width: 580px) { .fields { grid-template-columns: 1fr; } }

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-group label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
}
input[type="text"] {
  background: #0c1018;
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 11px 14px;
  border-radius: var(--r);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
  width: 100%;
}
input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(56,245,160,.1);
}
input::placeholder { color: var(--muted); }

/* ── BUTTONS ── */
.btn-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 22px;
  border-radius: var(--r);
  font-family: var(--sans);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: all .16s ease;
  white-space: nowrap;
}
.btn:disabled { opacity: .45; cursor: not-allowed; filter: none; transform: none !important; }
.btn-primary { background: var(--accent); color: #061a0e; }
.btn-primary:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(56,245,160,.25); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:not(:disabled):hover { border-color: var(--accent2); color: var(--accent2); }
.btn-danger  { background: transparent; border: 1.5px solid rgba(255,95,109,.35); color: var(--danger); }
.btn-danger:not(:disabled):hover { background: rgba(255,95,109,.08); }

.timer {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* ── STATUS BAR ── */
.status {
  display: none;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 11px 16px;
  border-radius: var(--r);
  margin-top: 18px;
  border-left: 3px solid;
}
.status.loading { display: flex; background: rgba(108,99,255,.08); border-color: var(--accent2); color: #a89aff; }
.status.ok      { display: flex; background: rgba(56,245,160,.07); border-color: var(--accent);  color: var(--accent); }
.status.err     { display: flex; background: rgba(255,95,109,.08); border-color: var(--danger);  color: var(--danger); }

.spin {
  width: 13px; height: 13px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESULT CARD ── */
.result-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-top: 20px;
  animation: up .3s ease;
}
@keyframes up {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.rc-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(56,245,160,.03);
}
.rc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink:0; }
.rc-name { font-weight: 700; font-size: 16px; }
.rc-url {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 240px;
}

.rc-body { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 20px; }
@media (max-width: 650px) { .rc-body { grid-template-columns: 1fr; } }

.rc-field { display: flex; flex-direction: column; gap: 4px; }
.rc-field.wide { grid-column: 1 / -1; }
.fk {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
}
.fv { font-size: 13px; line-height: 1.6; }
.fv.empty { color: var(--muted); font-style: italic; }
.tag {
  display: inline-block;
  background: rgba(56,245,160,.1);
  border: 1px solid rgba(56,245,160,.2);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  margin: 2px 3px 2px 0;
}
.outreach-box {
  background: rgba(108,99,255,.07);
  border: 1px solid rgba(108,99,255,.2);
  border-radius: 8px;
  padding: 13px 16px;
  font-size: 13px;
  line-height: 1.65;
  color: #c0b4ff;
  font-style: italic;
}

/* ── RESULTS TABLE ── */
.tbl-wrap {
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 720px;
}
thead tr { background: var(--surface2); }
th {
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
td.wrap { white-space: normal; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }
.tbl-empty {
  text-align: center;
  padding: 48px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}
.count { font-family: var(--mono); font-size: 11px; background: var(--border); padding: 3px 9px; border-radius: 20px; margin-left: 10px; color: var(--muted); }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<div class="hdr">
  <div class="logo-icon">🔍</div>
  <div class="logo-name">Company<em>Lens</em></div>
  <div class="hdr-pill">
    <span class="health-dot" id="hDot"></span>
    <span id="hText">checking...</span>
  </div>
</div>

<div class="wrap">

  <!-- ── SECTION 1: ENRICH ─────────────────────────────────── -->
  <div class="sec-head">
    <span class="sec-num">01</span>
    <h2>Enrich a Company</h2>
  </div>

  <div class="card">
    <div class="fields">
      <div class="field-group">
        <label>Website Name (optional)</label>
        <input type="text" id="iName" placeholder="e.g. Stripe Payments" />
      </div>
      <div class="field-group">
        <label>Company URL *</label>
        <input type="text" id="iUrl" placeholder="https://stripe.com" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="enrichBtn" onclick="doEnrich()">⚡ Enrich</button>
      <span class="timer" id="timerEl"></span>
    </div>

    <div class="status" id="statusEl">
      <div class="spin" id="statusSpin"></div>
      <span id="statusMsg"></span>
    </div>

    <div id="enrichResult"></div>
  </div>

  <!-- ── SECTION 2: ALL RESULTS ────────────────────────────── -->
  <div class="sec-head">
    <span class="sec-num">02</span>
    <h2>All Enriched Companies <span class="count" id="countEl">0</span></h2>
  </div>

  <div class="btn-row" style="margin-bottom:16px">
    <button class="btn btn-outline" onclick="loadAll()">📋 Show All Results</button>
    <button class="btn btn-danger"  onclick="clearAll()">🗑 Clear All</button>
  </div>

  <div class="tbl-wrap" id="tblWrap">
    <div class="tbl-empty">Click "Show All Results" to load the dataset.</div>
  </div>

</div><!-- /wrap -->

<script>
// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch("/health");
    const d = await r.json();
    document.getElementById("hDot").className = "health-dot ok";
    document.getElementById("hText").textContent = d.key_set ? "API key ✓" : "No API key";
    if (!d.key_set) document.getElementById("hDot").className = "health-dot err";
  } catch {
    document.getElementById("hDot").className = "health-dot err";
    document.getElementById("hText").textContent = "Backend offline";
  }
}
checkHealth();

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const el = document.getElementById("statusEl");
  const spin = document.getElementById("statusSpin");
  const txt = document.getElementById("statusMsg");
  el.className = "status " + type;
  spin.style.display = type === "loading" ? "block" : "none";
  txt.textContent = msg;
}
function hideStatus() { document.getElementById("statusEl").className = "status"; }

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerInterval = null;
function startTimer() {
  let s = 0;
  const el = document.getElementById("timerEl");
  clearInterval(timerInterval);
  timerInterval = setInterval(() => { el.textContent = `${++s}s elapsed`; }, 1000);
}
function stopTimer(finalMs) {
  clearInterval(timerInterval);
  document.getElementById("timerEl").textContent = `✓ Done in ${(finalMs/1000).toFixed(1)}s`;
}

// ── Enrich ────────────────────────────────────────────────────────────────────
async function doEnrich() {
  const url  = document.getElementById("iUrl").value.trim();
  const name = document.getElementById("iName").value.trim();
  if (!url) { setStatus("err", "Please enter a company URL first."); return; }

  const btn = document.getElementById("enrichBtn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="width:13px;height:13px;border-width:2px"></div> Enriching…';
  document.getElementById("enrichResult").innerHTML = "";
  document.getElementById("timerEl").textContent = "";
  setStatus("loading", "Scraping pages and generating AI insights… (15–45 sec)");
  startTimer();

  const t0 = Date.now();
  try {
    const res = await fetch("/enrich", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, website_name: name })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    stopTimer(Date.now() - t0);
    setStatus("ok", `Enriched: ${data.company_name || data.website_name}`);
    document.getElementById("enrichResult").innerHTML = renderCard(data);
    // Refresh count
    loadCountOnly();
  } catch (e) {
    stopTimer(Date.now() - t0);
    setStatus("err", `Error: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = "⚡ Enrich";
  }
}

// ── Render card ───────────────────────────────────────────────────────────────
function val(v, fb="—") {
  return (v && String(v).trim()) ? esc(v) : `<span class="empty">${fb}</span>`;
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function renderCard(d) {
  const mails = Array.isArray(d.mail) ? d.mail : (d.mail ? [d.mail] : []);
  const mailHtml = mails.length
    ? mails.map(m => `<span class="tag">${esc(m)}</span>`).join("")
    : `<span class="fv empty">—</span>`;
  return `
  <div class="result-card">
    <div class="rc-head">
      <div class="rc-dot"></div>
      <div class="rc-name">${esc(d.company_name || d.website_name || "Unknown")}</div>
      <div class="rc-url">${esc(d._url || "")}</div>
    </div>
    <div class="rc-body">
      <div class="rc-field"><span class="fk">Website Name</span><span class="fv">${val(d.website_name)}</span></div>
      <div class="rc-field"><span class="fk">Phone</span><span class="fv">${val(d.mobile_number)}</span></div>
      <div class="rc-field"><span class="fk">Address</span><span class="fv">${val(d.address)}</span></div>
      <div class="rc-field"><span class="fk">Email(s)</span><div class="fv">${mailHtml}</div></div>
      <div class="rc-field wide"><span class="fk">Core Service</span><span class="fv">${val(d.core_service)}</span></div>
      <div class="rc-field"><span class="fk">Target Customer</span><span class="fv">${val(d.target_customer)}</span></div>
      <div class="rc-field"><span class="fk">Probable Pain Point</span><span class="fv">${val(d.probable_pain_point)}</span></div>
      <div class="rc-field wide"><span class="fk">Outreach Opener</span><div class="outreach-box">${val(d.outreach_opener, "Not generated")}</div></div>
    </div>
  </div>`;
}

// ── Load all results ──────────────────────────────────────────────────────────
async function loadCountOnly() {
  try {
    const r = await fetch("/results");
    const d = await r.json();
    document.getElementById("countEl").textContent = d.length;
  } catch {}
}

async function loadAll() {
  const wrap = document.getElementById("tblWrap");
  wrap.innerHTML = `<div class="tbl-empty"><div class="spin" style="margin:0 auto;width:20px;height:20px;border-width:2px;color:var(--muted)"></div></div>`;
  try {
    const res = await fetch("/results");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById("countEl").textContent = data.length;
    if (!data.length) {
      wrap.innerHTML = `<div class="tbl-empty">No results yet. Enrich a company first.</div>`;
      return;
    }
    wrap.innerHTML = renderTable(data);
  } catch (e) {
    wrap.innerHTML = `<div class="tbl-empty" style="color:var(--danger)">Failed to load: ${e.message}</div>`;
  }
}

function renderTable(rows) {
  const mailStr = r => (Array.isArray(r.mail) ? r.mail : [r.mail||""]).filter(Boolean).join(", ");
  const trs = rows.map(r => `
    <tr>
      <td title="${esc(r.company_name)}">${esc(r.website_name||r.company_name)}</td>
      <td><a href="${esc(r._url||"")}" target="_blank" style="color:var(--accent2);font-family:var(--mono);font-size:11px;text-decoration:none">${esc((r._url||"").replace(/^https?:\/\//,""))}</a></td>
      <td title="${esc(r.address)}">${esc(r.address)||'<span style="color:var(--muted)">—</span>'}</td>
      <td>${esc(r.mobile_number)||'<span style="color:var(--muted)">—</span>'}</td>
      <td title="${esc(mailStr(r))}">${esc(mailStr(r))||'<span style="color:var(--muted)">—</span>'}</td>
      <td class="wrap" style="max-width:240px;white-space:normal">${esc(r.core_service)}</td>
      <td class="wrap" style="max-width:200px;white-space:normal">${esc(r.probable_pain_point)}</td>
    </tr>`).join("");
  return `
  <table>
    <thead><tr>
      <th>Website</th><th>URL</th><th>Address</th><th>Phone</th>
      <th>Email</th><th>Core Service</th><th>Pain Point</th>
    </tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

// ── Clear ─────────────────────────────────────────────────────────────────────
async function clearAll() {
  if (!confirm("Delete all saved results? This cannot be undone.")) return;
  await fetch("/results/clear", { method: "POST" });
  document.getElementById("countEl").textContent = "0";
  document.getElementById("tblWrap").innerHTML = `<div class="tbl-empty">Results cleared.</div>`;
}

// Enter key shortcut
document.getElementById("iUrl").addEventListener("keydown", e => {
  if (e.key === "Enter") doEnrich();
});
</script>
</body>
</html>
